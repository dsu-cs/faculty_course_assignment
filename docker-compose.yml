services:
  postgres:
    # Reference: https://www.docker.com/blog/how-to-use-the-postgres-docker-official-image/
    image: postgres:latest
    container_name: postgres
    # we won't expose ports, containers will communicate via internal docker network
    env_file:
      - .env
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 1s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  solver:
    build:
      context: ./Solver
      dockerfile: Dockerfile
    container_name: solver
    # Mount a host directory to retrieve schedule.csv after the solver finishes.
    # Replace ./solver-output with any path on your machine.
    volumes:
      - ./solver-output:/app/output
    # The solver exits on its own once finished — no restart needed.
    restart: "no"


networks:
  backend:
    name: backend
    driver: bridge  # isolated from host network

volumes:
  postgres_data:
    name: postgres
