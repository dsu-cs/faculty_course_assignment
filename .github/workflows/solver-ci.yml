---
name: Solver CI

env:
  DOCKER_BUILDKIT: 1

on:
  pull_request:
    branches: ['main']
    paths:
      - 'Solver/**'
      - '.github/workflows/solver-ci.yml'

  push:
    branches: ['main', 'communications-setup']
    paths:
      - 'Solver/**'
      - '.github/workflows/solver-ci.yml'

concurrency:
  group: ${{ github.head_ref || github.run_id }}-solver
  cancel-in-progress: true

jobs:
### This is the testing of the Solver library
  native-solver-tests:
    name: Native solver tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install openpyxl

      - name: Run solver test suite
        run: python Solver/src/faculty_scheduling.py --test

      - name: Run solver against bundled sample CSVs
        run: |
          mkdir -p "${{ github.workspace }}/solver-output-native"
          python Solver/src/faculty_scheduling.py \
            --preferences Solver/preferences.csv \
            --time_blocks Solver/time_blocks.csv \
            --workload Solver/workload.csv \
            --output "${{ github.workspace }}/solver-output-native/schedule.csv"
          test -f "${{ github.workspace }}/solver-output-native/schedule.csv"

      - name: Upload native schedule.csv artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedule-native
          path: solver-output-native/schedule.csv
          retention-days: 7

  docker-solver-tests:
  ### This tests the solver system in the context of a standalone Docker container in case we split it out in the future
    name: Docker solver tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Build solver image
        run: docker build -t solver:ci ./Solver

      - name: Run solver test suite in Docker
        run: docker run --rm solver:ci --test

      - name: Run solver against bundled sample CSVs in Docker
        run: |
          mkdir -p "${{ github.workspace }}/solver-output-docker"
          docker run --rm \
            -v "${{ github.workspace }}/solver-output-docker:/app/output" \
            solver:ci
          test -f "${{ github.workspace }}/solver-output-docker/schedule.csv"

      - name: Upload docker schedule.csv artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedule-docker
          path: solver-output-docker/schedule.csv
          retention-days: 7
