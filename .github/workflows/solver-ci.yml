name: Solver CI

env:
  DOCKER_BUILDKIT: 1

on:
  pull_request:
    branches: ['main']
    paths:
      - 'Solver/**'
      - '.github/workflows/solver-ci.yml'

  push:
    branches: ['main']
    paths:
      - 'Solver/**'
      - '.github/workflows/solver-ci.yml'

concurrency:
  group: ${{ github.head_ref || github.run_id }}-solver
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build solver image
        uses: docker/build-push-action@v6
        with:
          context: ./Solver
          push: false
          load: true
          tags: solver:ci
          cache-from: type=gha,scope=solver
          cache-to: type=gha,scope=solver,mode=max

      - name: Run solver test suite
        run: docker run --rm solver:ci --test

      - name: Run solver against bundled sample CSVs
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/solver-output:/app/output \
            solver:ci
          test -f ${{ github.workspace }}/solver-output/schedule.csv

      - name: Upload schedule.csv artifact
        uses: actions/upload-artifact@v4
        with:
          name: schedule
          path: solver-output/schedule.csv
          retention-days: 7
