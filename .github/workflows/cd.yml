---
name: Docker Compose CD

description: Re-deploy on updates to `main` to our VM over SSH.

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # https://github.com/appleboy/ssh-action
      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          port: '22'
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300  # if we take over 5 minutes, there's a problem...
          # ref_name is the branch name, main for this workflow
          # .env is copied only if missing to avoid accidental overwrite.
          script: |
            set -eux
            cd "${{ secrets.PROJECT_PATH }}"
            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
              echo "Copied .env.example to .env"
            elif [ ! -f .env ]; then
              echo "WARNING: .env not found and .env.example not present" >&2
              exit 1
            else
              echo ".env already exists"
            fi
            git fetch --all --prune
            git checkout --force "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose pull
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose build
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose up -d \
              --force-recreate
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose ps
