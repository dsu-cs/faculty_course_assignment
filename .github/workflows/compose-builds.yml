name: Docker Compose Validation
description: Build & Run the Docker compose stack and pass health checks.

on:
  pull_request:
  push:

jobs:
  validate:
    name: Compose validation
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

        # https://github.com/marketplace/actions/docker-setup-compose
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest
          cache-binary: true

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      # https://github.com/marketplace/actions/docker-compose-health-check
      - name: Wait for health checks
        uses: jaracogmbh/docker-compose-health-check-action@v1.0.0
        with:
          timeout: 10
          retry-interval: 10
          compose-file: docker-compose.yml
          skip-exited: false
          skip-no-healthcheck: false
